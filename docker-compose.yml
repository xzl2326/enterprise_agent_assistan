version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: enterprise-agent-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - agent-network
    restart: unless-stopped

  agent-api:
    build: .
    container_name: enterprise-agent-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-your_openai_api_key}
      - LITELLM_MODEL=${LITELLM_MODEL:-gpt-4o}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION_NAME=enterprise_kb
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DEBUG=${DEBUG:-false}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=enterprise-agent-assistant
      - LANGCHAIN_ENDPOINT=${LANGCHAIN_ENDPOINT:-}
    depends_on:
      - qdrant
    networks:
      - agent-network
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

networks:
  agent-network:
    driver: bridge

volumes:
  qdrant_storage:
    driver: local